<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Контекстно: Угадай Слово</title>
    <!-- Локальный вызов созданных нами файлов (100% защита от ERR_BLOCKED_BY_CLIENT) -->
    <script src="firebase-app.js"></script>
    <script src="firebase-database.js"></script>
    <script src="https://yandex.ru"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: #131a26;
            --card-color: #1c2635;
            --text-color: #f0f4f8;
            --accent-color: #00bcd4;
            --border-color: #243146;
            --error-color: #ff5252;
            --success-color: #10b981;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .app-window {
            width: 100%;
            max-width: 460px;
            height: 85vh;
            min-height: 620px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            position: relative;
            overflow: hidden;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 19px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 800;
            background: linear-gradient(45deg, #fff, #88a0c0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-icon {
            color: #526685;
            font-size: 18px;
            cursor: pointer;
            background: none;
            border: none;
        }
        .header-icon:hover { color: var(--accent-color); }
        .status-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7e94b3;
            flex-shrink: 0;
        }
        .status-item {
            background: rgba(0,0,0,0.2);
            padding: 8px 12px;
            border: 1px solid var(--border-color);

            align-items: center;
            justify-content: center;
        }
        .hint-btn {
            grid-column: span 2;
            background: linear-gradient(135deg, #1e293b, #111827);
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 10px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;

        }
        .system-message {
            background-color: rgba(255, 82, 82, 0.1);
            border-left: 3px solid var(--error-color);
            color: #ff8a8a;
            padding: 12px;
            font-size: 13px;
            display: none;
            font-weight: 500;
            flex-shrink: 0;
        }
        .system-message.info {
            background-color: rgba(0, 188, 212, 0.1);

        }
        .input-container { display: flex; position: relative; flex-shrink: 0; }
        input {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            background-color: rgba(0,0,0,0.2);
            color: #fff;
            font-size: 15px;
            outline: none;
        }
        input:focus { border-color: var(--accent-color); }
        .submit-btn {
            background: #243146;
            border: 1px solid var(--border-color);
            border-left: none;
            color: #7e94b3;
            padding: 0 22px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .submit-btn.active { background: var(--accent-color); color: #0b0f19; }
        
        .win-screen {
            display: none;
            background: linear-gradient(145deg, #1c2d42, #0f1b29);
            border: 1px solid #2b4766;
            padding: 22px;
            text-align: center;
            flex-shrink: 0;
        }
        .win-btn {
            background: #00ebff;
            border: none;
            color: #050b14;
            padding: 12px 24px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 11px;
            margin-top: 10px;
        }

        .modal-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--panel-bg);
            z-index: 10;
            padding: 20px;
            box-sizing: border-box;
            display: none;
            flex-direction: column;
            gap: 12px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            flex-shrink: 0;
        }
        .modal-header h2 { margin: 0; font-size: 16px; text-transform: uppercase; color: var(--accent-color); letter-spacing: 1px; }
        
        .mode-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            flex-shrink: 0;
        }
        .mode-tab-btn {
            background: #1c2635;
            border: 1px solid var(--border-color);
            color: #7e94b3;
            padding: 10px;

            cursor: pointer;
        }
        .mode-tab-btn.active {

            border-color: var(--accent-color);

        }

        .create-panel {
            display: none;
            flex-direction: column;
            gap: 8px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .custom-input-box {
            display: none;
            flex-direction: column;
            gap: 6px;
            background: rgba(0,0,0,0.2);
            padding: 8px;
            border: 1px solid var(--border-color);
        }
        .custom-input-box input {
            padding: 8px;
            font-size: 13px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: #fff;
        }
        .custom-input-box .error-text {
            color: var(--error-color);
            font-size: 11px;
            display: none;
        }
        .create-buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .single-info-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            color: #cbd5e1;
            font-size: 13px;

            flex-shrink: 0;

        .room-list {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
            flex-direction: column;
            gap: 6px;

        }
        .room-list::-webkit-scrollbar, .history-list::-webkit-scrollbar { width: 4px; }
        .room-list::-webkit-scrollbar-track, .history-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .room-list::-webkit-scrollbar-thumb, .history-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

        .room-item {
            background: var(--card-color);
            border: 1px solid var(--border-color);
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-size: 13px;
            flex-shrink: 0;
        }
        .room-item:hover { border-color: var(--accent-color); }
        .room-info-text { font-size: 11px; color: #7e94b3; margin-top: 2px; }

        .history-list { 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
            margin-top: 4px;
            flex: 1;            
            overflow-y: auto;   
            padding-right: 4px; 
        }
        .word-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 11px 14px;
            background-color: var(--card-color);
            font-weight: 600;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.03);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;    
        }
        .word-text { position: relative; z-index: 2; text-shadow: 0 1px 3px rgba(0,0,0,0.9); }
        .word-hint-tag {
            font-size: 10px; color: #00bcd4; background: rgba(0, 188, 212, 0.15);
            padding: 2px 4px; margin-left: 6px; font-weight: bold; border: 1px solid rgba(0, 188, 212, 0.3);
        }
        .word-user-tag {
            font-size: 10px; color: #aaa; background: rgba(255,255,255,0.05);
            padding: 2px 4px; margin-right: 6px; border-radius: 2px;
        }
        .rank-badge {
            position: relative; z-index: 2; padding: 3px 8px; font-size: 11px; font-weight: 700;
            background-color: #0b0f19; border: 1px solid #334155; min-width: 38px; text-align: center;
        }
    </style>
</head>
<body>

<div class="app-window">
    <div class="header">
        <button class="header-icon" id="leaderboardTopBtn">🏆</button>
        <h1 id="gameTitle">Контекст</h1>
        <button class="header-icon" id="settingsMenuBtn">⚙️</button>
    </div>

    <div class="modal-overlay" id="profileModal">
        <div class="modal-header">
            <h2>🏆 Таблица лидеров (Честный Топ)</h2>
            <button class="header-icon" id="closeProfileBtn">✕</button>
        </div>
        <div class="room-list" id="leaderboardListContainer" style="display:flex;"></div>
    </div>

    <div class="modal-overlay" id="roomsModal">
        <div class="modal-header">
            <h2>⚙️ Настройки и Режимы</h2>
            <button class="header-icon" id="closeRoomsBtn">✕</button>
        </div>
        
        <div class="mode-tabs">
            <button class="mode-tab-btn active" id="tabSingleBtn">Одиночная игра</button>
            <button class="mode-tab-btn" id="tabMultiBtn">Комнаты (Онлайн)</button>
        </div>

        <div class="single-info-panel" id="singleModePanel"></div>
        
        <div class="create-panel" id="multiCreatePanel">
            <div class="create-buttons-grid">
                <button class="action-btn primary" id="createRoomRandomBtn">Случайное слово</button>
                <button class="action-btn" id="toggleCustomInputBtn">Загадать своё</button>
            </div>
            <div class="custom-input-box" id="customInputBox">
                <span style="font-size:11px; color:#7e94b3;">Введите секретное слово:</span>
                <div style="display:flex; gap:6px;">
                    <input type="text" id="customWordField" placeholder="слово..." style="flex:1;">
                    <button class="action-btn primary" id="submitCustomRoomBtn" style="padding:0 12px;">ОК</button>
                </div>
                <div class="error-text" id="customWordError">Ошибка: только русские буквы (от 2 букв)</div>
            </div>
        </div>
        
        <div class="room-list" id="roomListContainer"></div>
    </div>

    <div class="status-panel">
        <div class="status-item" id="gameId">Уровень: 1</div>
        <div class="status-item" id="attemptsCount">Попыток: 0</div>
        <div class="status-item" id="hintsCount" style="grid-column: span 2; background: rgba(0, 188, 212, 0.05); color: #00bcd4;">Подсказок использовано: 0</div>
        <button class="hint-btn" id="hintActionBtn">
            💡 Получить подсказку (за рекламу)
        </button>
    </div>

    <div id="systemMessage" class="system-message"></div>

    <div id="winScreen" class="win-screen">
        <h2>Поздравляем! 🎉</h2>
        <p id="winMessageCount"></p>
        <p id="winMessageStats" style="font-weight: bold; color: #fff;"></p>
        <button class="win-btn" id="winActionButton">Следующий уровень</button>
    </div>

    <div class="input-container">
        <input type="text" id="wordInput" placeholder="Введите слово..." autocomplete="off">
        <button id="submitBtn" class="submit-btn">➔</button>
    </div>

    <div class="history-list" id="historyLog"></div>
</div>

<script>
// 1. ИНИЦИАЛИЗАЦИЯ НАШЕГО СЕТЕВОГО ЛОКАЛЬНОГО ДВИЖКА
const firebaseConfig = {
    apiKey: "AIzaSyDTDKf9DU0tpcRIbuhmtlSrdTMA2sanu4g",
    authDomain: "://firebaseapp.com",
    databaseURL: "https://firebasedatabase.app",
    projectId: "contextno-e9b35",
    storageBucket: "contextno-e9b35.firebasestorage.app",
    messagingSenderId: "897841992804",
    appId: "1:897841992804:web:43d406a3123de0c6cf3b71",
    measurementId: "G-6HXFTB1TSE"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let secretWord = "завод"; // Заменили "кот" на "завод" для идеального старта!
let currentRoomName = "Одиночная игра";
let isMultiplayerMode = false;
let currentSingleLevel = 1;
let fairScore = 0; 
let playerName = "Игрок";
let userId = "user_" + Math.floor(Math.random() * 100000);

let attempts = 0;
let hintsUsed = 0;
let guessedWords = [];
let activeRoomId = null; 
let ysdk = null;

let leaderBoardData = [
    { name: "Словесный_Маг", score: 45 }, { name: "Контекст_Нинзя", score: 38 }, { name: "Эрудит2026", score: 32 }
];

let globalRooms = [];

if (typeof YaGames !== 'undefined') {
    YaGames.init().then(sdk => {
        ysdk = sdk;
        ysdk.adv.showFullscreenAdv({ callbacks: { onClose: function() { loadProgress(); } } });
    }).catch(() => { loadProgress(); });
} else { loadProgress(); }

function loadProgress() {
    const savedSecret = localStorage.getItem('ctx_active_secret');
    const savedRoomName = localStorage.getItem('ctx_active_room_name');
    const savedMode = localStorage.getItem('ctx_active_mode');
    const savedLvlNum = localStorage.getItem('ctx_single_level_num');
    const savedFairScore = localStorage.getItem('ctx_fair_score');
    const savedName = localStorage.getItem('ctx_player_name');
    
    if (savedSecret) secretWord = savedSecret;
    if (savedRoomName) currentRoomName = savedRoomName;
    if (savedMode) isMultiplayerMode = (savedMode === 'true');
    if (savedLvlNum) currentSingleLevel = parseInt(savedLvlNum);
    if (savedFairScore) fairScore = parseInt(savedFairScore);
    if (savedName) playerName = savedName;

    if(isMultiplayerMode) {
        isMultiplayerMode = false;
        currentRoomName = "Одиночная игра";
        secretWord = "кот";
    }

    initLevel();
    listenToGlobalRooms(); 
}

function initLevel() {
    attempts = 0;
    hintsUsed = 0;
    guessedWords = [];
    if (typeof hideMessage === "function") hideMessage();
    
    // Безопасная очистка элементов интерфейса с проверкой на их существование
    if (document.getElementById('historyLog')) document.getElementById('historyLog').innerHTML = '';
    if (document.getElementById('winScreen')) document.getElementById('winScreen').style.display = 'none';
    if (document.getElementById('wordInput')) {
        document.getElementById('wordInput').disabled = false;
        document.getElementById('wordInput').value = '';
    }
    if (document.getElementById('customInputBox')) document.getElementById('customInputBox').style.display = 'none';
    if (document.getElementById('customWordError')) document.getElementById('customWordError').style.display = 'none';
    
    // =========================================================================
    // БРОНЕБОЙНЫЙ АВТОМАТИЧЕСКИЙ ВЫБОР СЛОВА ДЛЯ ОДИНОЧНОЙ ИГРЫ
    // =========================================================================
    if (!isMultiplayerMode) {
        currentRoomName = "Одиночная игра";
        
        // 1. Считываем сохранённый уровень игрока
        currentSingleLevel = parseInt(localStorage.getItem('ctx_single_level_num')) || 1;
        
        // 2. БЕЗОПАСНАЯ ИИ-СБОРКА УРОВНЕЙ ИЗ КАРТЫ ЗНАНИЙ
        let levelWordsPool = [];
        
        // КРИТИЧЕСКИЙ ФИКС: Проверяем, инициализирована ли переменная в памяти вообще
        if (typeof semanticGroups !== "undefined" && semanticGroups !== null && Object.keys(semanticGroups).length > 0) {
            Object.keys(semanticGroups).forEach(groupName => {
                semanticGroups[groupName].forEach(w => {
                    if (!["еда", "животное", "зверь", "здание", "знания"].includes(w) && !levelWordsPool.includes(w)) {
                        levelWordsPool.push(w);
                    }
                });
            });
        }

        // Аварийный эталонный список на случай, если файл базы ещё догружается в память
        if (levelWordsPool.length === 0) {
            levelWordsPool = ["завод", "работа", "станок", "окно", "кухня", "сметана", "творог", "сыр", "кошка", "кот", "собака", "дом", "компьютер", "телефон", "школа", "деньги"];
        }

        // 3. Загадываем слово строго по номеру текущего уровня
        let wordIdx = (currentSingleLevel - 1) % levelWordsPool.length;
        secretWord = levelWordsPool[wordIdx].trim().toLowerCase();
        
        localStorage.setItem('ctx_active_secret', secretWord);
        console.log(`[ИИ-Автоуровень]: Успешный старт! Одиночный Уровень №${currentSingleLevel}, Секретное Слово: "${secretWord}"`);
    }
    // =========================================================================

    if (document.getElementById('gameTitle')) document.getElementById('gameTitle').innerText = currentRoomName;
    if (typeof updateStatus === "function") updateStatus();
    if (typeof toggleSubmitBtn === "function") toggleSubmitBtn();
}

function updateStatus() {
    if (!isMultiplayerMode) {
        document.getElementById('gameId').innerText = `Уровень: ${currentSingleLevel}`;
    } else {
        document.getElementById('gameId').innerText = `Лобби: #${activeRoomId}`;
    }
    document.getElementById('attemptsCount').innerText = `Попыток: ${attempts}`;
    document.getElementById('hintsCount').innerText = `Подсказок использовано: ${hintsUsed}`;
}

function showMessage(text, isInfo = false) {
    const msgBox = document.getElementById('systemMessage');
    if(msgBox) {
        msgBox.innerText = text;
        msgBox.classList.toggle('info', isInfo);
        msgBox.style.display = 'block';
    }
}

function hideMessage() { 
    const msgBox = document.getElementById('systemMessage');
    if(msgBox) msgBox.style.display = 'none'; 
}

function toggleSubmitBtn() {
    const input = document.getElementById('wordInput');
    const btn = document.getElementById('submitBtn');
    if(input && btn) btn.classList.toggle('active', input.value.trim().length > 0);
}

function saveCustomName() {
    const nameInput = document.getElementById('playerNameField').value.trim();
    if (nameInput.length > 0) {
        playerName = nameInput;
        localStorage.setItem('ctx_player_name', playerName);
        closeRoomsModal();
        showMessage(`Никнейм успешно обновлен на "${playerName}"`, true);
    }
}

function listenToGlobalRooms() {
    const roomsRef = db.ref('rooms');
    roomsRef.on('value', (snapshot) => {
        const roomsData = snapshot.val();
        renderOnlineRooms(roomsData);
    });
}

function renderOnlineRooms(roomsData) {
    const container = document.getElementById('roomListContainer');
    if (!container) return;
    container.innerHTML = '';
    
    if (!roomsData) {
        container.innerHTML = `<div style="text-align:center; font-size:12px; color:#526685; padding:20px;">Нет активных комнат. Создайте свою!</div>`;
        return;
    }

    Object.keys(roomsData).forEach(roomId => {
        const room = roomsData[roomId];

        // КРИТИЧЕСКАЯ ЗАЩИТА ЛОББИ: Если в комнате нет секретного слова или имени создателя — стираем её!
        if (!room || !room.secret || !room.creatorName || room.creatorName === "undefined") {
            console.log(`[ИИ-Защита лобби]: Обнаружена сломанная комната #${roomId}. Удаление из Firebase...`);
            db.ref('rooms/' + roomId).remove(); // Полностью стираем мусор из базы данных
            return; // Пропускаем её отрисовку, игроки её больше не увидят
        }

        let playersCount = room.players ? Object.keys(room.players).length : 0;

        // Если все игроки вышли из комнаты (0 игроков), она тоже больше не нужна
        if (playersCount === 0) {
            db.ref('rooms/' + roomId).remove();
            return;
        }

        const item = document.createElement('div');
        item.className = 'room-item';
        item.onclick = () => joinOnlineRoom(roomId);
        
        item.innerHTML = `
            <div>
                <b style="color:#fff;">Комната #${roomId} (${room.creatorName})</b>
                <div class="room-info-text">Режим: ${room.type} | Игроков: <b style="color:var(--accent-color);">${playersCount}/5</b></div>
            </div>
            <span style="color:${playersCount >= 5 ? 'var(--error-color)' : 'var(--accent-color)'}; font-size:11px; font-weight:bold;">
                ${playersCount >= 5 ? 'МЕСТ НЕТ' : 'ВХОД ➔'}
            </span>
        `;
        container.appendChild(item);
    });
}
    
function createRoomOnFirebase(word, typeName) {
    const roomId = Math.floor(100 + Math.random() * 900);
    const roomRef = db.ref('rooms/' + roomId);

    // Бронебойная сборка объекта комнаты, защищающая от появления undefined в лобби
    const roomData = {
        creatorId: userId || "unknown_id",
        creatorName: playerName || "Игрок",
        type: typeName || "Случайное слово",
        secret: word || "завод",
        createdAt: Date.now(), // Добавили метку времени для автоматической очистки
        players: {}
    };
    roomData.players[userId] = playerName || "Игрок";

    roomRef.set(roomData).then(() => {
        listenToActiveRoom(roomId);
    });
}

function joinOnlineRoom(roomId) {
    const playersRef = db.ref(`rooms/${roomId}/players`);
    playersRef.transaction((currentPlayers) => {
        if (currentPlayers === null) currentPlayers = {};
        if (currentPlayers[userId]) return currentPlayers;
        let keys = Object.keys(currentPlayers);
        if (keys.length >= 5) return; 
        currentPlayers[userId] = playerName;
        return currentPlayers;
    }, (error, committed, snapshot) => {
        if (!committed) {
            showMessage("Ошибка: в этой комнате уже заняты все 5 мест!");
        } else {
            listenToActiveRoom(roomId);
        }
    });
}

let activeRoomListener = null;
function listenToActiveRoom(roomId) {
    if (activeRoomListener && activeRoomId) {
        db.ref(`rooms/${activeRoomId}/words`).off('value', activeRoomListener);
    }
    
    activeRoomId = roomId;
    isMultiplayerMode = true;
    closeRoomsModal();
    initLevel();

    db.ref(`rooms/${roomId}`).once('value').then((snapshot) => {
        const data = snapshot.val();
        if (data) {
            secretWord = data.secret;
            currentRoomName = `Онлайн-Лобби #${roomId}`;
            document.getElementById('gameTitle').innerText = currentRoomName;
            updateStatus();
        }
    });

    const wordsRef = db.ref(`rooms/${roomId}/words`);
    activeRoomListener = wordsRef.on('value', (snapshot) => {
        const wordsData = snapshot.val();
        if (wordsData) {
            guessedWords = Object.keys(wordsData).map(key => wordsData[key]);
            guessedWords.sort((a, b) => a.rank - b.rank);
            attempts = guessedWords.length;
            updateStatus();
            renderHistory();
            if (guessedWords.some(w => w.word === secretWord)) {
                handleWin();
            }
        }
    });
}

// НАСТОЯЩИЙ 300-МЕРНЫЙ РАСЧЕТ КОСИНУСОВ (Исправленная и точная версия)
function calculateRussianSimilarity(w1, w2) {
    if (w1 === w2) return 1.0;

    if (semanticVectors[w1] && semanticVectors[w2]) {
        const vec1 = semanticVectors[w1];
        const vec2 = semanticVectors[w2];

        let dotProduct = 0, normA = 0, normB = 0;
        // Исправленный ювелирный цикл Float32
        for (let i = 0; i < vec1.length; i++) {
            dotProduct += vec1[i] * vec2[i]; // ТУТ ТЕПЕРЬ СТРОГО ИНДЕКС [i]
            normA += vec1[i] * vec1[i];
            normB += vec2[i] * vec2[i];
        }
        if (normA === 0 || normB === 0) return 0.01;
        let cosineSim = dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
        return Math.min(0.99, Math.max(0.01, (cosineSim + 1) / 2));
    }

    // Запасной буквенный режим для редких слов
    function getNgrams(word) {
        let ngrams = [];
        for (let i = 0; i < word.length - 1; i++) ngrams.push(word.substring(i, i + 2));
        return ngrams;
    }
    let g1 = getNgrams(w1), g2 = getNgrams(w2);
    if (g1.length === 0 || g2.length === 0) return 0.01;
    let matches = 0, tempG2 = [...g2];
    g1.forEach(ngram => {
        let idx = tempG2.indexOf(ngram);
        if (idx !== -1) { matches++; tempG2.splice(idx, 1); }
    });
    return Math.min(0.5, matches / Math.max(g1.length, g2.length));
}

function checkWord() {
    hideMessage();
    const inputElement = document.getElementById('wordInput');
    let word = inputElement.value.trim().toLowerCase().replace(/ё/g, 'е').replace(/[^а-яа-зе]/g, '');
    if (!word) return;
    inputElement.value = '';
    toggleSubmitBtn();

    if (word.length < 2) { showMessage('Ошибка: слово слишком короткое.'); return; }
    if (guessedWords.some(item => item.word === word)) { showMessage('Вы уже вводили это слово.'); return; }

    let isWinner = (word === secretWord);
    let rank = 9999;

    if (isWinner) {
        rank = 1;
    } else {
        const allWords = Object.keys(semanticVectors);
        const scoredWords = [];

        allWords.forEach(w => {
            const cleanKey = w.trim().replace(/["']/g, ''); 
            const score = calculateRussianSimilarity(cleanKey, secretWord);
            scoredWords.push({ word: cleanKey, score: score });
        });

        scoredWords.sort((a, b) => b.score - a.score);

        const targetWord = word.trim();
        const index = scoredWords.findIndex(item => item.word === targetWord);

        if (index !== -1) {
            rank = index + 1; 
        } else {
            let fallbackScore = calculateRussianSimilarity(targetWord, secretWord);
            rank = Math.floor(scoredWords.length - (fallbackScore * 1000));
            rank = Math.max(2, Math.min(scoredWords.length, rank));
        }

        // =========================================================================
        // АВТОМАТИЧЕСКАЯ ИИ-КОРРЕКТИРОВКА РАНГОВ ДЛЯ ВСЕХ СЛОВ ИЗ КАРТЫ ЗНАНИЙ
        // =========================================================================
        const inputClean = targetWord.toLowerCase();
        const secretClean = secretWord.trim().toLowerCase();

        // Перебираем все группы из файла word_groups.json
        Object.keys(semanticGroups).forEach(groupName => {
            const currentGroup = semanticGroups[groupName];

            // Проверяем: если И введённое слово, И секретное слово лежат в одной группе
            if (currentGroup.includes(inputClean) && currentGroup.includes(secretClean)) {
                
                // Авто-класс 1: Общие слова категории (еда, животное, здание, знания) уходят на 100 место
                if (["еда", "животное", "зверь", "здание", "знания"].includes(inputClean)) {
                    rank = 100;
                } 
                // Авто-класс 2: Сверхблизкие пары (кот к кошке, творог к сметане) принудительно тянем в топ-10
                else if (
                    (secretClean === "кошка" && ["кот", "котенок"].includes(inputClean)) ||
                    (secretClean === "сметана" && ["творог", "сыр", "молоко"].includes(inputClean)) ||
                    (secretClean === "завод" && ["работа", "станок", "деньги"].includes(inputClean))
                ) {
                    // Оставляем исходный близкий ранг, но страхуем, чтобы он был в топ-10
                    rank = Math.min(rank, 10);
                } 
                // Авто-класс 3: Для всех остальных слов этой группы подтягиваем ранг из красной зоны в горячую
                else {
                    rank = Math.min(rank, 150); // Автоматический топ-150 для всей темы!
                }
            }
        });
        // =========================================================================
    }

    const newWordObj = { word: word, rank: rank, isHint: false, userName: playerName };

    if (isMultiplayerMode && activeRoomId) {
        db.ref(`rooms/${activeRoomId}/words`).push(newWordObj);
    } else {
        attempts++;
        guessedWords.push(newWordObj);
        guessedWords.sort((a, b) => a.rank - b.rank);
        updateStatus();
        renderHistory();
        if (isWinner) handleWin();
    }
}

function giveHint() {
    let bestCurrentRank = 9999;
    if (guessedWords.length > 0) {
        bestCurrentRank = Math.min(...guessedWords.map(g => g.rank));
    }

    let targetWord = "";
    let targetRank = 9999;

    const allWords = Object.keys(semanticVectors);
    const scoredWords = [];

    // 1. Рассчитываем косинусное сходство для всех слов нашей базы
    allWords.forEach(w => {
        const cleanKey = w.trim().replace(/["']/g, ''); 
        const score = calculateRussianSimilarity(cleanKey, secretWord);
        scoredWords.push({ word: cleanKey, score: score });
    });

    // Сортируем: лучшие слова (score ближе к 1.0) идут наверх (ранг 1, 2, 3...)
    scoredWords.sort((a, b) => b.score - a.score);

    // 2. РАССЧИТЫВАЕМ ШАГ ПОДСКАЗКИ СТРОГО НА УЛУЧШЕНИЕ (Уменьшаем цифру ранга!)
    let targetNextRank = 1500; // Если игрок ещё вообще ничего близкого не угадал

    if (bestCurrentRank < 9999) {
        if (bestCurrentRank > 2000) {
            targetNextRank = 1200; // Сразу вытаскиваем из глубокой красной зоны вперёд
        } else if (bestCurrentRank > 150) {
            // Улучшаем текущую позицию игрока на 30% (двигаемся к 1-му месту!)
            targetNextRank = Math.floor(bestCurrentRank * 0.70); 
        } else {
            // В зелёной зоне (топ-150) двигаем игрока поштучно по 5 шагов
            targetNextRank = Math.max(2, bestCurrentRank - 5); 
        }
    }

    // 3. Ищем в базе слово, чья позиция ближе всего к targetNextRank, которое игрок ЕЩЁ НЕ ВВОДИЛ
    let minDiff = 99999;
    let bestWordMatch = "";
    let finalCalculatedRank = 9999;

    for (let i = 0; i < scoredWords.length; i++) {
        const currentRank = i + 1;
        const pWord = scoredWords[i].word;
        const alreadyGuessed = guessedWords.some(g => g.word === pWord);

        // Блокируем технический автодобор баз данных
        const isTechnicalTrash = pWord.startsWith("тех") || pWord.startsWith("пром") || pWord.startsWith("быт") || pWord.startsWith("мед") || pWord.startsWith("био") || pWord.startsWith("тур") || pWord.startsWith("сущ");

        if (!alreadyGuessed && pWord !== secretWord && !isTechnicalTrash) {
            let diff = Math.abs(currentRank - targetNextRank);
            if (diff < minDiff) {
                minDiff = diff;
                bestWordMatch = pWord;
                finalCalculatedRank = currentRank; // Ранг подсказки — это строго его порядковое место
            }
        }
    }

    if (bestWordMatch) {
        targetWord = bestWordMatch;
        targetRank = finalCalculatedRank;
    }

    // Защита: если игрок застрял у самой цели, подсказка выдаёт секретное слово
    if (!targetWord || (targetRank >= bestCurrentRank && bestCurrentRank <= 5)) {
        targetWord = secretWord;
        targetRank = 1;
    }

    // =========================================================================
    // ЗЕРКАЛЬНАЯ АВТО-СИНХРОНИЗАЦИЯ ПОДСКАЗОК ПО ФАЙЛУ СВЯЗЕЙ WORD_GROUPS
    // =========================================================================
    const tClean = targetWord.toLowerCase();
    const sClean = secretWord.trim().toLowerCase();

    if (typeof semanticGroups !== "undefined") {
        Object.keys(semanticGroups).forEach(groupName => {
            const currentGroup = semanticGroups[groupName];
            if (currentGroup.includes(tClean) && currentGroup.includes(sClean)) {
                if (["еда", "животное", "зверь", "здание", "знания"].includes(tClean)) {
                    targetRank = 100;
                } else if (
                    (sClean === "кошка" && ["кот", "котенок"].includes(tClean)) ||
                    (sClean === "сметана" && ["творог", "сыр", "молоко"].includes(tClean)) ||
                    (sClean === "завод" && ["работа", "станок", "деньги"].includes(tClean))
                ) {
                    targetRank = Math.min(targetRank, 10);
                } else {
                    targetRank = Math.min(targetRank, 150);
                }
            }
        });
    }
    // =========================================================================

    // Помечаем в истории как подсказку
    const hintWordObj = { word: targetWord, rank: targetRank, isHint: true, userName: "Подсказка" };

    if (isMultiplayerMode && activeRoomId) {
        db.ref(`rooms/${activeRoomId}/words`).push(hintWordObj);
    } else {
        hintsUsed++; 
        attempts++;
        guessedWords.push(hintWordObj);
        guessedWords.sort((a, b) => a.rank - b.rank);
        updateStatus();
        renderHistory();
        if (targetWord === secretWord) handleWin();
    }
}

function handleWin() {
    document.getElementById('wordInput').disabled = true;
    const selfGuessed = guessedWords.filter(w => !w.isHint).length;
    
    let winMessageStatsText = "";
    if (!isMultiplayerMode) {
        if (hintsUsed === 0) {
            fairScore++;
            localStorage.setItem('ctx_fair_score', fairScore);
            winMessageStatsText = `Итог: пройдено БЕЗ подсказок! Очки в Таблице Лидеров: ${fairScore}`;
        } else {
            winMessageStatsText = `Итог: использовано подсказок: ${hintsUsed}. Этот уровень не пойдет в честный Топ-10.`;
        }
    } else {
        winMessageStatsText = `Поздравляем! Команда успешно расшифровала онлайн-слово.`;
        if (activeRoomId) {
            setTimeout(() => {
                db.ref(`rooms/${activeRoomId}`).remove();
            }, 5000);
        }
    }

    document.getElementById('winScreen').style.display = 'block';
    document.getElementById('winMessageCount').innerText = `Вы угадали секретное слово за ${attempts} попыток!`;
    document.getElementById('winMessageStats').innerText = winMessageStatsText;
    
    const winBtn = document.getElementById('winActionButton');
    if (isMultiplayerMode) {
        winBtn.innerText = "Вернуться в лобби";
        winBtn.onclick = function() { openRoomsModal(); };
    } else {
        winBtn.innerText = "Следующий уровень";
        winBtn.onclick = function() { nextLevel(); };
    }
}

function nextLevel() {
    isMultiplayerMode = false;
    currentRoomName = "Одиночная игра";
    activeRoomId = null;
    
    currentSingleLevel++;
    localStorage.setItem('ctx_single_level_num', currentSingleLevel);
    
    // ИИ-СБОРКА УРОВНЕЙ ИЗ КАРТЫ ЗНАНИЙ
    let levelWordsPool = [];
    
    if (typeof semanticGroups !== "undefined" && Object.keys(semanticGroups).length > 0) {
        // Собираем ВСЕ слова из всех групп карт знаний в один большой список уровней
        Object.keys(semanticGroups).forEach(groupName => {
            const wordsInGroup = semanticGroups[groupName];
            wordsInGroup.forEach(w => {
                // Исключаем абстрактные слова-категории и дубликаты
                if (!["еда", "животное", "зверь", "здание", "знания"].includes(w) && !levelWordsPool.includes(w)) {
                    levelWordsPool.push(w);
                }
            });
        });
    }

    // Если вдруг карта знаний не успела загрузиться, используем эталонный безопасный список
    if (levelWordsPool.length === 0) {
        levelWordsPool = ["завод", "работа", "станок", "окно", "кухня", "сметана", "творог", "сыр", "компьютер", "интернет", "школа", "ученик", "кошка", "кот", "собака", "дом", "комната", "автомобиль", "вокзал", "деньги"];
    }
    
    // Выбираем слово по номеру текущего уровня (используем остаток от деления, чтобы уровни шли бесконечно по кругу)
    let wordIdx = (currentSingleLevel - 1) % levelWordsPool.length;
    secretWord = levelWordsPool[wordIdx].trim().toLowerCase();
    
    console.log(`[ИИ-Одиночная]: Старт уровня №${currentSingleLevel}. Загадано идеальное слово: ${secretWord}`);
    
    localStorage.setItem('ctx_active_secret', secretWord);
    initLevel();
}

function listenToGlobalRooms() {
    const roomsRef = db.ref('rooms');
    roomsRef.on('value', (snapshot) => {
        const roomsData = snapshot.val();
        if (roomsData) {
            const now = Date.now();
            const fiveHoursInMs = 5 * 60 * 60 * 1000;
            
            Object.keys(roomsData).forEach(roomId => {
                const room = roomsData[roomId];
                if (room.createdAt && (now - room.createdAt > fiveHoursInMs)) {
                    db.ref(`rooms/${roomId}`).remove();
                    delete roomsData[roomId];
                }
            });
        }
        renderOnlineRooms(roomsData);
    });
}
